<!DOCTYPE html>
<html lang="en">

<head>
	<!-- HEAD_START -->
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Two Moons Studio</title>
	<link rel="stylesheet" href="styles.css?v=5">
	<!-- HEAD_END -->
</head>

<body>

	<!-- EDIT_BUTTON_START -->
	<button id="editModeBtn">Edit</button>
	<!-- EDIT_BUTTON_END -->

	<!-- EDIT_MENU_START -->
<div id="editMenu" class="hidden" style="
    position: absolute;
    top: 60px;
    left: 12px;
    z-index: 9999;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 160px;">
	<button id="editLayoutOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">✏️ Edit layout</button>
	<button id="editCodeOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">🧵 Edit code</button>
	<button id="uploadAssetsOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">📤 Upload assets</button>
</div>
<!-- EDIT_MENU_END -->

	<!-- LAYOUT_INFO_START -->
	<div id="layoutInfo" class="layout-info hidden">
		<div class="layout-info-content"></div>
	</div>
	<!-- LAYOUT_INFO_END -->

	<!-- GRID_OVERLAY_START -->
	<div id="grid-overlay" class="grid-overlay hidden"></div>
	<!-- GRID_OVERLAY_END -->

	<!-- LANDING_CONTAINER_START -->
	<div id="landing-container" class="landing-container">
		<!-- BACKGROUND_LAYERS_START -->
		<div id="background" class="background-layer"></div>
		<div id="dusk-overlay" class="dusk-layer"></div>
		<!-- BACKGROUND_LAYERS_END -->

		<!-- COTTAGE_ELEMENTS_START -->
		<img id="cottage-small" src="spring cottage.png" class="editable-element cottage-element" data-edit-name="Cottage (small)" data-edit-icon="ð " data-edit-view="normal" alt="Cottage">

		<img id="cottage-zoomed" src="spring cottage.png" class="editable-element cottage-element zoom-element hidden" data-edit-name="Cottage (zoomed)" data-edit-icon="ð" data-edit-view="zoomed" alt="Cottage zoomed">
		<!-- COTTAGE_ELEMENTS_END -->

		<!-- LIGHTS_ELEMENT_START -->
		<img id="lights" src="spring cottage lights.png" class="lights-element" alt="Cottage lights">
		<!-- LIGHTS_ELEMENT_END -->

		<!-- SOLENA_ORB_START -->
		<div id="solena-orb" class="editable-element orb-element" data-edit-name="Solena Orb" data-edit-icon="â¨" data-edit-view="normal">
		</div>
		<!-- SOLENA_ORB_END -->
	</div>
	<!-- LANDING_CONTAINER_END -->

	<!-- SOLENA_CHAT_START -->
	<div id="solena-chat" class="chat-overlay hidden">
		<div class="chat-container">
			<div class="chat-header">
				<div class="chat-orb-small"></div>
				<h2>Solena</h2>
				<button id="close-chat" class="close-chat-btn">â</button>
			</div>

			<div id="chat-messages" class="chat-messages">
				<div class="message solena-message">
					<div class="message-bubble">
						Hello, dear one. I'm Solena, your companion in this creative journey. How can I help you today? â¨
					</div>
				</div>
			</div>

			<div class="chat-input-container">
				<button id="voice-input-btn" class="voice-btn">ð¤</button>
				<input type="text" id="chat-input" placeholder="Type your message..." />
				<button id="send-btn" class="send-btn">Send</button>
			</div>
		</div>
	</div>
	<!-- SOLENA_CHAT_END -->

	<!-- TAILOR_OVERLAY_START -->
	<div id="tailorOverlay" style="
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      z-index: 4000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
  ">
		<div style="
        width: min(920px, 100%);
        max-height: 90vh;
        overflow: auto;
        background: rgba(255,255,255,0.98);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        padding: 16px;
        font-family: Georgia, serif;
    ">
			<div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
				<div style="font-size:22px; font-weight:bold;">ð§µ Tailor</div>
				<div style="margin-left:auto; display:flex; gap:8px;">
					<button id="tailorCloseBtn" style="padding:10px 14px; border:none; border-radius:10px; background:#ff6b6b; color:white; font-weight:bold; cursor:pointer;">Close</button>
				</div>
			</div>

			<div style="font-size:13px; color:#444; line-height:1.5; margin-bottom:12px;">
				Paste your GitHub token once (it stays on this iPad). Then paste a patch JSON. Use <b>Dry Run</b> first, then <b>Commit Patch</b>.
			</div>

			<div style="display:grid; grid-template-columns: 1fr; gap:10px; margin-bottom:12px;">
				<label style="font-size:13px; font-weight:bold;">GitHub Token (fine-grained PAT)</label>
				<input id="tailorToken" type="password" placeholder="Paste token here (saved locally on this iPad)" style="padding:12px; border:2px solid rgba(180,140,255,0.35); border-radius:12px; font-size:14px; width:100%;" />
				<div style="display:flex; gap:8px; flex-wrap:wrap;">
					<button id="tailorSaveTokenBtn" style="padding:10px 14px; border:none; border-radius:10px; background:#6b4fbb; color:white; font-weight:bold; cursor:pointer;">Save Token</button>
					<button id="tailorClearTokenBtn" style="padding:10px 14px; border:none; border-radius:10px; background:#999; color:white; font-weight:bold; cursor:pointer;">Clear Token</button>
					<div id="tailorTokenStatus" style="align-self:center; font-size:13px; color:#555;"></div>
				</div>
			</div>

			<div style="display:grid; grid-template-columns: 1fr; gap:10px; margin-bottom:12px;">
				<label style="font-size:13px; font-weight:bold;">Patch JSON</label>
				<textarea id="tailorPatch" rows="10" placeholder='Example:
{
  "owner": "twomoonsonesky",
  "repo": "Twomoonsstudio",
  "branch": "main",
  "filePath": "app.js",
  "find": "setInterval(checkTimeAndSetMode, 3600000);",
  "replace": "setInterval(checkTimeAndSetMode, 60 * 1000);",
  "commitMessage": "Tailor patch: update interval"
}' style="padding:12px; border:2px solid rgba(180,140,255,0.35); border-radius:12px; font-size:14px; width:100%; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;"></textarea>

				<!-- Tailor: Function Finder -->
				<div style="margin-top:16px; padding-top:16px; border-top:1px solid rgba(0,0,0,0.08);">
					<div style="font-weight:bold; margin-bottom:8px;">ð§µ Tailor â Function Finder</div>

					<label style="font-size:12px; display:block; margin-bottom:6px;">Choose file</label>
					<select id="tailor-file" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(0,0,0,0.15);">
						<option value="app.js" selected>JavaScript (app.js)</option>
						<option value="tools.js">JavaScript (tools.js)</option>
						<option value="index.html" disabled>HTML (coming soon)</option>
						<option value="styles.css" disabled>CSS (coming soon)</option>
					</select>

					<button id="tailor-go" style="margin-top:10px; width:100%; padding:10px; border:none; border-radius:10px;
                   background:rgba(100,150,255,0.9); color:white; font-weight:bold; cursor:pointer;">
						Functions â¾
					</button>

					<div id="tailor-output" style="margin-top:10px; font-size:12px; max-height:240px; overflow:auto;
                   background:rgba(0,0,0,0.04); padding:10px; border-radius:10px;">
					</div>
				</div>

				<div style="display:flex; gap:8px; flex-wrap:wrap;">
					<button id="tailorDryRunBtn" style="padding:10px 14px; border:none; border-radius:10px; background:#3b82f6; color:white; font-weight:bold; cursor:pointer;">Dry Run</button>
					<button id="tailorCommitBtn" style="padding:10px 14px; border:none; border-radius:10px; background:#16a34a; color:white; font-weight:bold; cursor:pointer;">Commit Patch</button>
				</div>
			</div>

			<div style="font-size:12px; color:#444; margin-bottom:6px;"><b>Result</b></div>
			<pre id="tailorResult" style="
          white-space: pre-wrap;
          background: rgba(0,0,0,0.06);
          padding: 12px;
          border-radius: 12px;
          font-size: 12px;
          line-height: 1.4;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          min-height: 80px;
      "></pre>
		</div>
	</div>
	<!-- TAILOR_OVERLAY_END -->

	<!-- SCRIPTS_START -->
	<!-- IMPORTANT: tools.js first, then app.js -->
	<script type="module" src="tools.js?v=5"></script>
	<script type="module" src="app.js?v=5"></script>
	<!-- SCRIPTS_END -->
</body>

</html>
