<!DOCTYPE html>
<html lang="en">

<head>
	<!-- HEAD_START -->
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Two Moons Studio</title>
	<link rel="stylesheet" href="styles.css?v=5">
	<!-- HEAD_END -->
</head>

<body>

	<!-- EDIT_BUTTON_START -->
<!-- Button removed - using 3-button menu instead -->
<!-- EDIT_BUTTON_END -->

	<!-- EDIT_MENU_START -->
<div id="editMenu"  style="
    position: absolute;
    top: 90px;
    left: 12px;
    z-index: 9999;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 160px;">
	<button id="editLayoutOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">Edit layout</button>
	<button id="editCodeOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">Edit code</button>
	<button id="uploadAssetsOption" style="padding:10px;border-radius:8px;border:0;background:#eee;">Upload assets</button>
</div>
<!-- EDIT_MENU_END -->

	<!-- LAYOUT_INFO_START -->
	<div id="layoutInfo" class="layout-info hidden">
		<div class="layout-info-content"></div>
	</div>
	<!-- LAYOUT_INFO_END -->

	<!-- GRID_OVERLAY_START -->
	<div id="grid-overlay" class="grid-overlay hidden"></div>
	<!-- GRID_OVERLAY_END -->

	<!-- LANDING_CONTAINER_START -->
	<div id="landing-container" class="landing-container">
		<!-- BACKGROUND_LAYERS_START -->
		<div id="background" class="background-layer"></div>
		<div id="dusk-overlay" class="dusk-layer"></div>
		<!-- BACKGROUND_LAYERS_END -->

		<!-- COTTAGE_ELEMENTS_START -->
		<img id="cottage-small" src="spring cottage.png" class="editable-element cottage-element" data-edit-name="Cottage (small)" data-edit-icon="ð " data-edit-view="normal" alt="Cottage">

		<img id="cottage-zoomed" src="spring cottage.png" class="editable-element cottage-element zoom-element hidden" data-edit-name="Cottage (zoomed)" data-edit-icon="ð " data-edit-view="zoomed" alt="Cottage zoomed">
		<!-- COTTAGE_ELEMENTS_END -->

		<!-- LIGHTS_ELEMENT_START -->
		<img id="lights" src="spring cottage lights.png" class="lights-element" alt="Cottage lights">
		<!-- LIGHTS_ELEMENT_END -->

		<!-- SOLENA_ORB_START -->
		<div id="solena-orb" class="editable-element orb-element" data-edit-name="Solena Orb" data-edit-icon="â¨" data-edit-view="normal">
		</div>
		<!-- SOLENA_ORB_END -->
	</div>
	<!-- LANDING_CONTAINER_END -->

	<!-- SOLENA_CHAT_START -->
	<div id="solena-chat" class="chat-overlay hidden">
		<div class="chat-container">
			<div class="chat-header">
				<div class="chat-orb-small"></div>
				<h2>Solena</h2>
				<button id="close-chat" class="close-chat-btn">â</button>
			</div>

			<div id="chat-messages" class="chat-messages">
				<div class="message solena-message">
					<div class="message-bubble">
						Hello, dear one. I'm Solena, your companion in this creative journey. How can I help you today? â¨
					</div>
				</div>
			</div>

			<div class="chat-input-container">
				<button id="voice-input-btn" class="voice-btn">ð¤</button>
				<input type="text" id="chat-input" placeholder="Type your message..." />
				<button id="send-btn" class="send-btn">Send</button>
			</div>
		</div>
	</div>
	<!-- SOLENA_CHAT_END -->

<!-- UPLOAD_UI_START -->
<div id="uploadUI" class="upload-overlay upload-hidden">
	<div class="upload-panel">
		<div class="upload-header">
			<span>ð¤ Upload Assets</span>
			<button id="closeUploadBtn" class="upload-close">â</button>
		</div>
		
		<input type="file" id="fileInput" accept="image/*" style="display:none;" multiple />
		
		<button id="selectFilesBtn" class="upload-btn-secondary">
			Choose Files
		</button>
		
		<div id="fileList" class="file-list"></div>
		
		<button id="uploadBtn" class="upload-btn-primary upload-hidden">
			Upload to Firebase
		</button>
		
		<div id="uploadProgress" class="upload-progress upload-hidden">
			<div class="progress-bar">
				<div id="progressFill" class="progress-fill"></div>
			</div>
			<div id="uploadStatus" class="upload-status"></div>
		</div>
		
		<div id="uploadResults" class="upload-results upload-hidden"></div>
	</div>
</div>
<!-- UPLOAD_UI_END -->

	<!-- TAILOR_OVERLAY_START -->
<div id="tailorOverlay" class="tailor-overlay" style="display:none;">
  <div class="tailor-panel">
    <div class="tailor-header">
      <h2>[TAILOR]</h2>
      <button id="tailorCloseBtn" class="tailor-close">X</button>
    </div>

    <div class="tailor-content">
      <div class="tailor-section">
        <h3>GitHub Token (fine-grained PAT)</h3>
        <input type="password" id="tailorToken" placeholder="Paste token here">
        <div class="tailor-button-row">
          <button id="tailorSaveTokenBtn">Save Token</button>
          <button id="tailorClearTokenBtn">Clear Token</button>
        </div>
        <div id="tailorTokenStatus">Token saved on this iPad</div>
      </div>

      <div class="tailor-section">
        <h3>Patch JSON</h3>
        <textarea id="tailorPatch" placeholder='Example:
{
  "owner": "twomoonsonesky",
  "repo": "Twomoonsstudio",
  "branch": "main",
  "filePath": "app.js",
  "find": "setInterval(checkTimeAndSetMode, 3600000);",
  "replace": "setInterval(checkTimeAndSetMode, 60 * 1000);",
  "commitMessage": "Tailor patch: update interval"
}'></textarea>
        <div class="tailor-button-row">
          <button id="tailorDryRunBtn">Dry Run</button>
          <button id="tailorCommitBtn">Commit Patch</button>
        </div>
        <div id="tailorResult"></div>
      </div>

      <div class="tailor-section">
        <h3>[FUNCTION FINDER]</h3>
        <label>Choose file</label>
        <select id="tailor-file"></select>
        <button id="tailor-go">Functions</button>
        <div id="tailor-output"></div>
      </div>
    </div>
  </div>
</div>
<!-- TAILOR_OVERLAY_END -->

	<!-- SCRIPTS_START -->
	<!-- IMPORTANT: tools.js first, then app.js -->
	<script type="module" src="tools.js?v=5"></script>
	<script type="module" src="app.js?v=5"></script>
	<!-- SCRIPTS_END -->
</body>

</html>
